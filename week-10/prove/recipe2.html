<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe Book</title>

  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo-title">
      <img src="images/recipe-book.png" alt="Recipe Book Logo">
      <h1>RecipeBook</h1>
    </div>

    <div class="search">
      <input id="searchInput" type="text" placeholder="Find a recipe">
      <button id="searchBtn">
        <img src="images/search.svg" alt="search">
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main id="recipesContainer"></main>

  <!-- FOOTER -->
  <footer>
    <p>
      <a href="https://www.flaticon.com/free-icons/recipe">
        Recipe icons created by Freepik - Flaticon
      </a>
    </p>

    <div class="social">
      <a href="#"><img src="images/instagram_icon.svg" alt="instagram"></a>
      <a href="#"><img src="images/youtube_icon.svg" alt="youtube"></a>
      <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest"></a>
    </div>
  </footer>

  <script src="main.js"></script>

</body>
</html>
